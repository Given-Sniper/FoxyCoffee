<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoxyCoffee | Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header inner-header">
    <nav class="navbar container">
      <a class="brand" href="index.html">FoxyCoffee</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="menu.html">Menu</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </nav>
  </header>

  <main class="menu-page">
    <section class="page-intro container">
      <p class="eyebrow">Menu</p>
      <h1>Freshly brewed favorites</h1>
      <p>Explore our signature drinks, made with carefully roasted beans and a calm coffeehouse feel.</p>
    </section>

    <section class="menu-grid-section container">
      <div class="menu-grid">
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=900&q=80" alt="Cappuccino in a white cup">
          <div class="menu-card-content">
            <h3>Cappuccino</h3>
            <p class="price">$4.50</p>
          </div>
        </article>
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=900&q=80" alt="Latte with foam art">
          <div class="menu-card-content">
            <h3>Latte</h3>
            <p class="price">$4.80</p>
          </div>
        </article>
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?auto=format&fit=crop&w=900&q=80" alt="Espresso served in a small cup">
          <div class="menu-card-content">
            <h3>Espresso</h3>
            <p class="price">$3.20</p>
          </div>
        </article>
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=900&q=80" alt="Mocha topped with chocolate">
          <div class="menu-card-content">
            <h3>Mocha</h3>
            <p class="price">$5.10</p>
          </div>
        </article>
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1523942839745-7848d31b0d59?auto=format&fit=crop&w=900&q=80" alt="Flat white in a ceramic mug">
          <div class="menu-card-content">
            <h3>Flat White</h3>
            <p class="price">$4.60</p>
          </div>
        </article>
        <article class="menu-card">
          <img src="https://images.unsplash.com/photo-1497636577773-f1231844b336?auto=format&fit=crop&w=900&q=80" alt="Iced coffee on a wooden table">
          <div class="menu-card-content">
            <h3>Iced Coffee</h3>
            <p class="price">$4.90</p>
          </div>
        </article>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
