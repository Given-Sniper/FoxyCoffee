<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoxyCoffee | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header inner-header">
    <nav class="navbar container">
      <a class="brand" href="index.html">FoxyCoffee</a>
      <button class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a class="active" href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-shell">
      <div class="form-panel">
        <p class="eyebrow">Welcome back</p>
        <h1>Login</h1>
        <p>Sign in to view your favorites and keep your coffee ritual close.</p>

        <form class="auth-form" data-form="login">
          <label for="login-email">Email</label>
          <input id="login-email" name="email" type="email" placeholder="you@example.com" required>

          <label for="login-password">Password</label>
          <input id="login-password" name="password" type="password" placeholder="Enter your password" required>

          <button class="button primary-button" type="submit">Login</button>
        </form>

        <p class="form-link">Don't have an account? <a href="register.html">Register</a></p>
        <p class="form-message" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
